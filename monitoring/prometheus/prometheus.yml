global:
  scrape_interval: 15s

# on prend le exporter
scrape_configs:
  - job_name: proxmox
    metrics_path: /pve
    params:
      module: [default]
      cluster: ["1"]
      node: ["1"]
    static_configs:
      - targets:
          #IP NODEE PROXMOX A REPLACE
          - 192.168.1.50
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: pve-exporter:9221
