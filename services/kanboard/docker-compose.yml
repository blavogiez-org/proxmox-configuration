# il y a des vulnérabilités pour certaines anciennes versions
# https://nvd.nist.gov/vuln/detail/CVE-2025-52576

# poc typique pour un déploiement automatisé Komodo
name: kanboard

services:
  app:
    image: ${KANBOARD_IMAGE:-kanboard/kanboard:latest}
    container_name: kanboard
    restart: always
    volumes:
      - data:/var/www/app/data
      - plugins:/var/www/app/plugins
      - certs:/etc/nginx/ssl
    environment:
      DATABASE_URL: postgres://kanboard:${KANBOARD_DB_PASSWORD}@db/kanboard
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kanboard.rule=Host(`unkanboard.blavogiez.fr`)"
      - "traefik.http.routers.kanboard.entrypoints=web"
      - "traefik.http.services.kanboard.loadbalancer.server.port=80"
    networks:
      - default
      - proxy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: kanboard
      POSTGRES_PASSWORD: ${KANBOARD_DB_PASSWORD}
      POSTGRES_DB: kanboard
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kanboard"]
      start_period: 15s
      interval: 10s
      timeout: 5s
    networks:
      - default

volumes:
  data:
  plugins:
  certs:
  db:

networks:
  default:
  proxy:
    external: true
