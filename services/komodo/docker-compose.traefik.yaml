# https://doc.traefik.io/traefik/getting-started/docker/
# https://doc.traefik.io/traefik/expose/docker/basic/
# docker-compose.yml
# j'ai aussi rajouté :ro au montage
services:
  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: 
      - proxy

networks:
  proxy:
    external: true