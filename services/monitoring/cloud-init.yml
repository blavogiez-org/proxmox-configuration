#cloud-config
hostname: ${hostname}
preserve_hostname: false

users:
  - name: admin
    groups: docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

packages:
  - qemu-guest-agent
  - curl
  - git

write_files:
  - path: /opt/monitoring/docker-compose.yml
    content: |
      services:
        grafana:
          image: grafana/grafana:11.5.2
          restart: unless-stopped
          ports:
            - "3000:3000"
          volumes:
            - grafana_data:/var/lib/grafana
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
            - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
          environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin

        loki:
          image: grafana/loki:3.4.2
          restart: unless-stopped
          ports:
            - "3100:3100"
          command: -config.file=/etc/loki/loki.yml
          volumes:
            - ./loki/loki.yml:/etc/loki/loki.yml:ro
            - loki_data:/loki

        prometheus:
          image: prom/prometheus:v3.2.1
          restart: unless-stopped
          ports:
            - "9090:9090"
          command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=30d"
            - "--web.enable-remote-write-receiver"
          volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus

        pve-exporter:
          image: prompve/prometheus-pve-exporter:3.9.0
          restart: unless-stopped
          ports:
            - "9221:9221"
          environment:
            PVE_VERIFY_SSL: "false"

      volumes:
        grafana_data:
        loki_data:
        prometheus_data:

  - path: /opt/monitoring/prometheus/prometheus.yml
    content: |
      global:
        scrape_interval: 15s

      scrape_configs:
        - job_name: proxmox
          metrics_path: /pve
          params:
            module: [default]
          static_configs:
            - targets:
                - 192.168.1.50
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: pve-exporter:9221

  - path: /opt/monitoring/loki/loki.yml
    content: |
      auth_enabled: false
      server:
        http_listen_port: 3100
      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory
      schema_config:
        configs:
          - from: 2026-06-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      compactor:
        working_directory: /loki/compactor
        retention_enabled: true
      limits_config:
        retention_period: 336h

  - path: /opt/monitoring/grafana/provisioning/datasources/datasources.yml
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus:9090
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki:3100

  - path: /opt/monitoring/grafana/provisioning/dashboards/dashboards.yml
    content: |
      apiVersion: 1
      providers:
        - name: Homelab
          options:
            path: /var/lib/grafana/dashboards

runcmd:
  - systemctl enable --now qemu-guest-agent
  - curl -sSL https://get.docker.com | sh
  - cd /opt/monitoring && docker compose up -d
