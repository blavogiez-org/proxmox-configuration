# repris de github.com/TwiN/gatus
services:
  gatus:
    image: ghcr.io/twin/gatus:stable
    container_name: gatus
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GATUS_CONFIG_PATH: /config
      GATUS_LOG_LEVEL: INFO
    volumes:
      - ./config:/config:ro
      - ./data:/data
