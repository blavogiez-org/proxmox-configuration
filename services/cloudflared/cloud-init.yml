hostname: ${hostname}
preserve_hostname: false

users:
  - name: admin
    groups: docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

packages:
  - qemu-guest-agent
  - curl

write_files:
  - path: /opt/cloudflared/.env
    permissions: '0600'
    content: |
      TUNNEL_TOKEN=${tunnel_token}
      TUNNEL_NAME=proxmox-tunnel

  - path: /opt/cloudflared/docker-compose.yml
    content: |
      services:
        cloudflared:
          image: cloudflare/cloudflared:latest
          container_name: cloudflared
          restart: always
          command: tunnel run
          env_file:
            - .env

runcmd:
  - systemctl enable --now qemu-guest-agent
  - curl -fsSL https://get.docker.com | sudo sh
  - cd /opt/cloudflared
  - docker compose up -d