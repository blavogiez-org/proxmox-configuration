name: Déploiement frontend sur une VM ayant Caddy

on:
  workflow_call:
    secrets:
      FRONT_SSH_KEY:
        required: true
      FRONT_HOST:
        required: true
      FRONT_USER:
        required: true

permissions:
  contents: read

jobs:
  frontend-deployment:
    runs-on: self-hosted
    steps:
      - uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.FRONT_SSH_KEY }}
          log-public-key: false

      - run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - uses: actions/checkout@v4
        with:
          path: blavogiez/action/frontend-deployment/caller

      - uses: actions/checkout@v4
        with:
          repository: blavogiez/proxmox-configuration
          path: blavogiez/action/frontend-deployment/infra

      - run: |
          pipx install ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - env:
          CALLER_DIR: ${{ github.workspace }}/blavogiez/action/frontend-deployment/caller
          FRONT_HOST: ${{ secrets.FRONT_HOST }}
          FRONT_USER: ${{ secrets.FRONT_USER }}
        run: |
          cd "$GITHUB_WORKSPACE/blavogiez/action/frontend-deployment/infra" 2>/dev/null
          python3 websites/deploy_all.py
