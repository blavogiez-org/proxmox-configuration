---
name: Déploiement websites sur Caddy

on:
  workflow_call:
    secrets:
      CADDY_SSH_KEY:
        required: true

permissions:
  contents: read

jobs:
  deploy-websites:
    runs-on: self-hosted
    steps:
      - name: Import OpenBao secrets
        uses: hashicorp/vault-action@v4
        with:
          url: https://vault.blavogiez.fr
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/proxmox/ci * ;
            
      - name: Check secret loaded
        run: |
          test -n "$CADDY_SSH_KEY"
          echo "CADDY_SSH_KEY loaded"

      - uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ env.CADDY_SSH_KEY }}
          log-public-key: false

      - run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - uses: actions/checkout@v4
        with:
          path: caller

      - uses: actions/checkout@v4
        with:
          repository: jobacogiez-org/proxmox-gitops
          path: infra

      - run: |
          pipx install ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Déployer les websites déclarés
        env:
          CALLER_DIR: ${{ github.workspace }}/caller
          CALLER_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          cd "$GITHUB_WORKSPACE/infra"
          bash ansible/deploy-websites.sh