# but de ce playbook : déployer n'importe quel compose tel que décrit dans la structure services
# trame : on copie les fichiers dans /opt/{service}, on template les fichiers, et selon si ça a changé ou non on redémarre la stack
- hosts: "{{ host }}"
  become: true
  vars_files:
    - ../../settings.yml
  vars:
    target_remote_dir: "/opt"
    target_local_dir: "{{ playbook_dir }}/../../services/{{ target_service }}"

  tasks:
    # cette tache évite la redondance pour la configuration des sites regardés en générant la configuration à partir des sites de Caddy
    # j'ai essayé avec des spotters de certs (= surveiller les sous domaines d'un domaine) mais c'est en retard sur la réalité
    - name: exclusif au service monitoring ; on charge les sites en variable pour générer le template des sites à surveiller le statut
      ansible.builtin.shell:
        # on recolte les domaines définis dans les labels Traefik d'un conteneur
        # services/dummy-service/docker-compose.yml:      - "traefik.http.routers.kanboard.rule=Host(`apercu-site.blavogiez.fr`)"
        cmd: !unsafe | 
          find . -name 'docker*compose*.y*ml*' -exec grep "Host(" {} \; | cut -d '`' -f2
          find services/caddy/sites -name '*.conf.j*' -exec grep '{{ domain }}' {} \; | grep -v '[#*]' 
        # unsafe sert à ne pas interpreter les expressions jinja récoltées. Elles doivent etre interprétées plus tard, au moment du déploiement uniforme
        # et on affiche tous les sites, en excluant ceux commentés et les wildcards
        # chdir: "{{ playbook_dir }}/../.."
      when: target_service == 'monitoring'
      register: retrieved_websites

    - name: S'assurer que le répertoire existe
      ansible.builtin.file:
        path: "{{ target_remote_dir }}"
        state: directory
        mode: '0755'

    - name: Copier l'ensemble du service vers le remote
      ansible.builtin.copy:
        src: "{{ target_local_dir }}"
        dest: "{{ target_remote_dir }}"
        mode: '0644'
      register: target_remote_stack

    - name: générer les éventuels templates (*.j2)
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ target_remote_dir }}/{{ target_service }}/{{ item.path | regex_replace('\\.j2$', '') }}"
        mode: '0644'
      loop: "{{ query('community.general.filetree', target_local_dir) }}"
      when: item.state == 'file' and item.path.endswith('.j2')
      register: target_templates

    - name: S'assurer que la stack est présente et démarrée
      community.docker.docker_compose_v2:
        project_src: "{{ target_remote_dir }}/{{ target_service }}"
        state: present
      register: target_compose

    - name: Redémarrer la stack si un fichier monté a changé
      community.docker.docker_compose_v2:
        project_src: "{{ target_remote_dir }}/{{ target_service }}"
        state: restarted
      when:
        - target_remote_stack.changed or target_templates.changed
        - not target_compose.changed
