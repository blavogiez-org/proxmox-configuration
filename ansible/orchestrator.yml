- name: "PREPARATION & INFRA"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: ["../settings.yml"]

  tasks:
    - name: "Récupération Secrets OpenBao"
      set_fact:
        vault: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox-gitops', engine_mount='secret').data }}"
      environment:
        VAULT_ADDR: "http://192.168.10.15:80"
        VAULT_TOKEN: "{{ lookup('env', 'VAULT_TOKEN') }}"

    - name: "Application Infrastructure (Terraform)"
      shell: |
        terraform init
        terraform apply -auto-approve \
          -var="proxmox_api_token={{ vault.proxmox_api_token }}" \
          -var="proxmox_endpoint={{ proxmox.endpoint }}" \
          -var="storage={{ proxmox.storage }}" \
          -var="ssh_public_key_path=~/.ssh/id_rsa.pub"
      args:
        chdir: "../terraform/environments/production"

    - name: "Génération automatique des fichiers .env"
      template:
        src: "{{ item }}"
        dest: "{{ item | regex_replace('\\.j2$', '') }}"
      with_fileglob:
        - "../services/*/*.env.j2"

- name: "DEPLOIEMENT COMPLET"
  import_playbook: playbooks/bootstrap.yml
- import_playbook: playbooks/deploy-caddy.yml
- import_playbook: playbooks/deploy-cloudflared.yml
- import_playbook: playbooks/deploy-wgeasy.yml
- import_playbook: playbooks/deploy-actions-runner.yml
